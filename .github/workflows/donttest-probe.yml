# Fast debug-fix lane for the `--run-donttest` example hang (PR #270).
#
# Localized: the concatenated donttest set hangs in the TreeLength block, on
# macOS + ubuntu-4.1 (windows completes), and ONLY after the PR's new
# Bremer/SuboptimalTrees blocks have run in the same process. macOS survives
# iter1 and hangs iter2 -- monotonic degradation across iterations, the
# fingerprint of accumulating C++ scoring state (dirty cache/static left by the
# bgs/NA searches), not RNG (Bremer & SuboptimalTrees both set.seed(0), so the
# RNG entering TreeLength is reset identically each iter).
#
# This probe pins (a) WHICH of TreeLength's three sub-calls hangs -- profile /
# random-5 / hsj -- and (b) whether .Random.seed differs across iterations
# (rules RNG in or out), and (c) whether the hang needs the B/S priming
# (unprimed control). All under gtimeout with a durable marker+seed trail.
name: donttest-probe

on:
  workflow_dispatch:
  push:
    branches:
      - claude/bremer-support-calculation-857d5f

concurrency:
  group: donttest-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ${{ matrix.config.os }}
    name: donttest-probe (${{ matrix.config.os }}, ${{ matrix.config.r }})
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-24.04, r: '4.1', rspm: "https://packagemanager.posit.co/cran/__linux__/noble/latest"}

    env:
      R_REALLY_FORCE_SYMBOLS: true
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: |
            phangorn=?ignore-before-r=4.1.0
            ${{ matrix.config.r == '4.1' && 'url::https://cran.r-project.org/src/contrib/Archive/highs/highs_1.12.0-3.tar.gz' || '' }}

      - name: Install coreutils for gtimeout (macOS)
        if: runner.os == 'macOS'
        run: brew install coreutils

      - name: Install TreeSearch
        run: R CMD INSTALL --no-multiarch --with-keep.source .
        shell: bash

      # ---------------------------------------------------------------------
      # PRIMED: run the exact example sequence that precedes TreeLength in the
      # concatenated file, then TreeLength's three sub-calls with a marker + RNG
      # digest before each. Looped; the last START marker names the hanging call.
      # ---------------------------------------------------------------------
      - name: 'Primed TreeLength sub-call localization'
        continue-on-error: true
        run: |
          TO=""
          if command -v gtimeout >/dev/null 2>&1; then TO="gtimeout 900";
          elif [ "$RUNNER_OS" = "Linux" ]; then TO="timeout 900"; fi
          cat > primed.R <<'EOF'
          suppressMessages({library(TreeSearch); library(TreeTools)})
          pdf(NULL)
          data("inapplicable.phyData", package = "TreeSearch")
          d1 <- inapplicable.phyData[[1]]
          tree <- BalancedTree(d1)
          dataset6 <- inapplicable.phyData[["Vinther2008"]]
          hier <- CharacterHierarchy("1" = 2:3)
          tree6 <- BalancedTree(dataset6)
          seeddig <- function() {
            s <- if (exists(".Random.seed", envir = globalenv())) get(".Random.seed", globalenv()) else NA
            substr(paste(utils::head(as.integer(s), 5), collapse = ","), 1, 44)
          }
          mark <- function(m) { cat(sprintf("MARKER: %s | seed=%s\n", m, seeddig())); flush(stdout()) }
          prime <- function() {
            for (tp in c("Bremer", "SuboptimalTrees", "TaxonInfluence"))
              example(tp, package = "TreeSearch", run.donttest = TRUE,
                      character.only = TRUE, echo = FALSE)
          }
          for (iter in 1:4) {
            prime()
            mark(sprintf("iter%d profile START", iter))
            print(TreeLength(tree, d1, concavity = "profile"))
            mark(sprintf("iter%d random5 START", iter))
            print(TreeLength(5, d1))
            mark(sprintf("iter%d hsj START", iter))
            print(TreeLength(tree6, dataset6, hierarchy = hier, inapplicable = "hsj"))
            mark(sprintf("iter%d TreeLength DONE", iter))
          }
          cat("PRIMED ALL DONE\n")
          EOF
          $TO Rscript primed.R || echo "### PRIMED hit timeout/err (rc=$?)"
        shell: bash

      # ---------------------------------------------------------------------
      # UNPRIMED CONTROL: the same three TreeLength sub-calls, looped, with NO
      # Bremer/SuboptimalTrees/TaxonInfluence priming. If this never hangs, the
      # hang REQUIRES the accumulated state the bgs/NA searches leave behind.
      # ---------------------------------------------------------------------
      - name: 'Unprimed TreeLength control'
        continue-on-error: true
        run: |
          TO=""
          if command -v gtimeout >/dev/null 2>&1; then TO="gtimeout 420";
          elif [ "$RUNNER_OS" = "Linux" ]; then TO="timeout 420"; fi
          cat > unprimed.R <<'EOF'
          suppressMessages({library(TreeSearch); library(TreeTools)})
          pdf(NULL)
          data("inapplicable.phyData", package = "TreeSearch")
          d1 <- inapplicable.phyData[[1]]
          tree <- BalancedTree(d1)
          dataset6 <- inapplicable.phyData[["Vinther2008"]]
          hier <- CharacterHierarchy("1" = 2:3)
          tree6 <- BalancedTree(dataset6)
          mark <- function(m) { cat(sprintf("MARKER: %s\n", m)); flush(stdout()) }
          for (iter in 1:6) {
            mark(sprintf("iter%d profile", iter));  print(TreeLength(tree, d1, concavity = "profile"))
            mark(sprintf("iter%d random5", iter));  print(TreeLength(5, d1))
            mark(sprintf("iter%d hsj", iter));      print(TreeLength(tree6, dataset6, hierarchy = hier, inapplicable = "hsj"))
          }
          cat("UNPRIMED ALL DONE\n")
          EOF
          $TO Rscript unprimed.R || echo "### UNPRIMED hit timeout/err (rc=$?)"
        shell: bash
