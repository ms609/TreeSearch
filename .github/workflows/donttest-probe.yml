# Fast debug-fix lane for the `--run-donttest` example hang (PR #270).
#
# Findings so far (see PR history):
#   * The Bremer example -- bounded OR unbounded, default OR bgs kernel -- runs
#     in <9 s on macOS AND ubuntu-4.1, byte-identical results. EXONERATED.
#   * The hang is PR-introduced (cpp-search finishes the whole check, donttest
#     included, in ~16 min on ubuntu-4.1) yet every donttest example runs in
#     seconds *in isolation*.
#   * R CMD check runs ALL \donttest blocks concatenated in ONE R process; the
#     new serial searches run before TaxonInfluence's PARALLEL (default-nThreads)
#     search. The untested condition is an interaction across that shared,
#     accumulated process state -- exactly the class of the parallel-teardown
#     bug in this package's history.
#
# This workflow reproduces that faithful condition: it runs every donttest block
# in Rd order, in one process, looped, with a durable marker trail, under
# gtimeout/timeout. A hang's last marker localises the culprit block.
name: donttest-probe

on:
  workflow_dispatch:
  push:
    branches:
      - claude/bremer-support-calculation-857d5f

concurrency:
  group: donttest-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ${{ matrix.config.os }}
    name: donttest-probe (${{ matrix.config.os }}, ${{ matrix.config.r }})
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-24.04, r: '4.1', rspm: "https://packagemanager.posit.co/cran/__linux__/noble/latest"}

    env:
      R_REALLY_FORCE_SYMBOLS: true
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: |
            phangorn=?ignore-before-r=4.1.0
            ${{ matrix.config.r == '4.1' && 'url::https://cran.r-project.org/src/contrib/Archive/highs/highs_1.12.0-3.tar.gz' || '' }}

      - name: Install coreutils for gtimeout (macOS)
        if: runner.os == 'macOS'
        run: brew install coreutils

      - name: Install TreeSearch
        run: R CMD INSTALL --no-multiarch --with-keep.source .
        shell: bash

      # ---------------------------------------------------------------------
      # FAITHFUL REPRO: every donttest block, one process, Rd order, looped,
      # with a durable marker trail. If the process hangs, gtimeout kills it and
      # the printed marker trail's last "START" (with no matching "DONE") names
      # the culprit block.
      # ---------------------------------------------------------------------
      - name: Concatenated donttest reproduction (one process, marker trail)
        continue-on-error: true
        run: |
          TO=""
          if command -v gtimeout >/dev/null 2>&1; then TO="gtimeout 900";
          elif [ "$RUNNER_OS" = "Linux" ]; then TO="timeout 900"; fi
          rm -f MARKER.txt
          cat > concat.R <<'EOF'
          library(TreeSearch)
          pdf(NULL)  # headless graphics device (R CMD check provides one)
          markf <- "MARKER.txt"
          mark <- function(msg) {
            line <- sprintf("%s | %s", format(Sys.time(), "%H:%M:%S"), msg)
            cat("MARKER:", line, "\n")
            cat(line, "\n", file = markf, append = TRUE)
            flush(stdout())
          }
          topics <- c("Bremer", "SuboptimalTrees", "TaxonInfluence", "TreeLength")
          for (iter in 1:3) {
            for (tp in topics) {
              mark(sprintf("iter%d %s START", iter, tp))
              example(tp, package = "TreeSearch", run.donttest = TRUE,
                      character.only = TRUE, echo = FALSE)
              mark(sprintf("iter%d %s DONE", iter, tp))
            }
          }
          mark("ALL DONE")
          EOF
          $TO Rscript concat.R || echo "### CONCAT hit timeout/err (rc=$?)"
          echo "===== marker trail ====="; cat MARKER.txt 2>/dev/null || echo "(no marker file)"
        shell: bash

      # ---------------------------------------------------------------------
      # CONTROL: TaxonInfluence alone in a fresh process, looped, to tell an
      # interaction (hangs only after the new examples) from a standalone
      # TaxonInfluence hang.
      # ---------------------------------------------------------------------
      - name: Control -- TaxonInfluence alone, looped
        continue-on-error: true
        run: |
          TO=""
          if command -v gtimeout >/dev/null 2>&1; then TO="gtimeout 600";
          elif [ "$RUNNER_OS" = "Linux" ]; then TO="timeout 600"; fi
          rm -f MARKER2.txt
          cat > solo.R <<'EOF'
          library(TreeSearch)
          pdf(NULL)
          markf <- "MARKER2.txt"
          for (iter in 1:5) {
            line <- sprintf("%s | iter%d TaxonInfluence START",
                            format(Sys.time(), "%H:%M:%S"), iter)
            cat("MARKER:", line, "\n"); cat(line, "\n", file = markf, append = TRUE)
            flush(stdout())
            example("TaxonInfluence", package = "TreeSearch", run.donttest = TRUE,
                    character.only = TRUE, echo = FALSE)
          }
          cat("SOLO ALL DONE\n")
          EOF
          $TO Rscript solo.R || echo "### SOLO hit timeout/err (rc=$?)"
          echo "===== marker trail ====="; cat MARKER2.txt 2>/dev/null || echo "(no marker file)"
        shell: bash
