# Fast debug-fix lane for the `--run-donttest` example hang (PR #270).
#
# The full R-CMD-check `checking examples with --run-donttest` step burns the
# 6 h GitHub ceiling when an example runs away, and only tells us *that* it hung,
# not *where* or *why*.  This workflow installs the branch and runs targeted
# reproductions under `gtimeout`/`timeout` on the surfaces the full check hangs
# on (macOS-latest, the ubuntu R 4.1 leg) plus windows-latest (which passes) as
# a determinism cross-check.  Manual + push, hard `timeout-minutes` cap.
#
# Hypothesis under test: `Bremer(method = "pool")` defaults to
# `inapplicable = "bgs"` (a float-based kernel) and forwards it into the pool
# search; a platform-divergent float condition in that kernel loops on
# macOS/ubuntu but exits on windows -- explaining a 6 h hang on one OS and a
# ~1 h pass on another under the *same* seed and serial (nThreads = 1) path.
name: donttest-probe

on:
  workflow_dispatch:
  push:
    branches:
      - claude/bremer-support-calculation-857d5f

concurrency:
  group: donttest-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ${{ matrix.config.os }}
    name: donttest-probe (${{ matrix.config.os }}, ${{ matrix.config.r }})
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-24.04, r: '4.1', rspm: "https://packagemanager.posit.co/cran/__linux__/noble/latest"}

    env:
      R_REALLY_FORCE_SYMBOLS: true
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: |
            phangorn=?ignore-before-r=4.1.0
            ${{ matrix.config.r == '4.1' && 'url::https://cran.r-project.org/src/contrib/Archive/highs/highs_1.12.0-3.tar.gz' || '' }}

      - name: Install coreutils for gtimeout (macOS)
        if: runner.os == 'macOS'
        run: brew install coreutils

      - name: Install TreeSearch
        run: R CMD INSTALL --no-multiarch --with-keep.source .
        shell: bash

      # ---------------------------------------------------------------------
      # DISCRIMINATOR: same seeded, serial, 4-replicate deep pool search under
      # the DEFAULT kernel vs the `inapplicable = "bgs"` kernel that
      # Bremer(method = "pool") actually uses.  Prints poolsize + best score so
      # the values can be compared across OSes (determinism cross-check).  If
      # bgs hangs where default is seconds, that is the cause.
      # ---------------------------------------------------------------------
      - name: 'Discriminator: default kernel vs bgs kernel'
        continue-on-error: true
        run: |
          TO=""
          if command -v gtimeout >/dev/null 2>&1; then TO="gtimeout 300";
          elif [ "$RUNNER_OS" = "Linux" ]; then TO="timeout 300"; fi
          cat > disc.R <<'EOF'
          library(TreeSearch)
          data("inapplicable.phyData", package = "TreeSearch")
          d <- inapplicable.phyData[["Vinther2008"]]
          cat("OS:", Sys.info()[["sysname"]], "| R:", as.character(getRversion()),
              "| NTip:", TreeTools::NTip(d), "\n")
          run1 <- function(tag, ...) {
            set.seed(0)
            t0 <- Sys.time()
            st <- SuboptimalTrees(d, maxSuboptimal = 10, maxReplicates = 4,
                                  nThreads = 1, verbosity = 2, ...)
            sc <- sort(round(as.double(attr(st, "scores")), 6))
            cat(sprintf("[%s] %.1fs poolsize=%d best=%.6f digest=%s\n", tag,
                        as.double(difftime(Sys.time(), t0, units = "secs")),
                        length(st), min(sc),
                        substr(paste(sc, collapse = ","), 1, 60)))
          }
          run1("default")
          run1("bgs", inapplicable = "bgs")
          cat("DISCRIMINATOR DONE\n")
          EOF
          $TO Rscript disc.R || echo "### DISCRIMINATOR hit the timeout or errored (rc=$?)"
        shell: bash

      # ---------------------------------------------------------------------
      # FAITHFUL PRE-FIX REPRO: the verbatim unbounded Bremer(method = "pool")
      # call (bgs default, 96 replicates, depth 10, no maxSeconds) that shipped
      # on commit 88cb280a, under timeout with verbosity so a hang shows the
      # last progress line.  continue-on-error: a timeout here is the finding.
      # ---------------------------------------------------------------------
      - name: 'Faithful repro: unbounded Bremer(method="pool")'
        continue-on-error: true
        run: |
          TO=""
          if command -v gtimeout >/dev/null 2>&1; then TO="gtimeout 300";
          elif [ "$RUNNER_OS" = "Linux" ]; then TO="timeout 300"; fi
          cat > repro.R <<'EOF'
          library(TreeSearch)
          data("inapplicable.phyData", package = "TreeSearch")
          d <- inapplicable.phyData[["Vinther2008"]]
          set.seed(0)
          trees <- MaximizeParsimony(d, maxReplicates = 8, nThreads = 1, verbosity = 0)
          cat("built", length(trees), "trees; starting unbounded pool Bremer...\n")
          t0 <- Sys.time()
          decay <- Bremer(trees, d, method = "pool", nThreads = 1, verbosity = 2)
          cat(sprintf("UNBOUNDED Bremer pool completed in %.1fs\n",
                      as.double(difftime(Sys.time(), t0, units = "secs"))))
          print(decay)
          EOF
          $TO Rscript repro.R || echo "### FAITHFUL REPRO hit the timeout or errored (rc=$?)"
        shell: bash

      # ---------------------------------------------------------------------
      # VERIFY (gate): the *bounded* Bremer donttest example must complete fast.
      # ---------------------------------------------------------------------
      - name: Verify the bounded Bremer donttest example completes
        run: |
          TO=""
          if command -v gtimeout >/dev/null 2>&1; then TO="gtimeout 300";
          elif [ "$RUNNER_OS" = "Linux" ]; then TO="timeout 300"; fi
          cat > verify.R <<'EOF'
          library(TreeSearch)
          pdf(NULL)  # headless graphics device; R CMD check provides one, example() does not
          t0 <- Sys.time()
          example("Bremer", package = "TreeSearch", run.donttest = TRUE,
                  character.only = TRUE, echo = FALSE)
          cat(sprintf("Bremer example completed in %.1fs\n",
                      as.double(difftime(Sys.time(), t0, units = "secs"))))
          EOF
          $TO Rscript verify.R
        shell: bash
