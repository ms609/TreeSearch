# Fast debug-fix lane for the `--run-donttest` example hang (PR #270).
#
# Localized: the hang is the pre-existing TreeLength(..., concavity = "profile")
# call on inapplicable.phyData[[1]] == Agnarsson2004 (62 tips, 225 chars).
#   * Fixed tree -> RNG refuted; unprimed control hangs -> accumulated-state
#     refuted; single-threaded profile kernels -> parallel-teardown refuted.
#   * Full `git diff cpp-search...HEAD` touches NO profile code (pp_info_extra_step.r,
#     PrepareData.R, ts_mc_fitch.cpp, MaddisonSlatkin, ts_data.h) -> byte-identical
#     to cpp-search -> pre-existing, not introduced by this PR.
#   * Platform split: fast on windows, ~90s on ubuntu-4.1, hangs on macOS.
#
# PrepareDataProfile() computes StepInformation() per unique character pattern;
# multistate 62-tip patterns hit .ApproxStepInformation -> mc_fitch_scores(split,
# n_mc = 100000). This probe times each pattern with a START marker at n_mc=1000
# then 100000, so the last START on macOS names the hanging pattern, and whether
# the cost scales with n_mc tells MC-perf from exact-recursion.
name: donttest-probe

on:
  workflow_dispatch:
  push:
    branches:
      - claude/bremer-support-calculation-857d5f

concurrency:
  group: donttest-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ${{ matrix.config.os }}
    name: donttest-probe (${{ matrix.config.os }}, ${{ matrix.config.r }})
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-24.04, r: '4.1', rspm: "https://packagemanager.posit.co/cran/__linux__/noble/latest"}

    env:
      R_REALLY_FORCE_SYMBOLS: true
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: |
            phangorn=?ignore-before-r=4.1.0
            ${{ matrix.config.r == '4.1' && 'url::https://cran.r-project.org/src/contrib/Archive/highs/highs_1.12.0-3.tar.gz' || '' }}

      - name: Install coreutils for gtimeout (macOS)
        if: runner.os == 'macOS'
        run: brew install coreutils

      - name: Install TreeSearch
        run: R CMD INSTALL --no-multiarch --with-keep.source .
        shell: bash

      # ---------------------------------------------------------------------
      # Per-pattern StepInformation timing. n_mc=1000 first (should complete
      # everywhere and map the expensive patterns), then n_mc=100000 (the real
      # default, which hangs macOS). Last "START" with no matching time = culprit.
      # ---------------------------------------------------------------------
      - name: 'Per-pattern profile timing (n_mc 1000 then 100000)'
        continue-on-error: true
        run: |
          TO=""
          if command -v gtimeout >/dev/null 2>&1; then TO="gtimeout 1000";
          elif [ "$RUNNER_OS" = "Linux" ]; then TO="timeout 1000"; fi
          cat > prof.R <<'EOF'
          suppressMessages({library(TreeSearch); library(TreeTools)})
          data("inapplicable.phyData", package = "TreeSearch")
          pd <- inapplicable.phyData[[1]]
          mat <- PhyDatToMatrix(pd, ambigNA = FALSE)
          uniqCols <- which(!duplicated(t(mat)))
          cat(sprintf("OS=%s R=%s nTip=%d nSite=%d nUnique=%d\n",
                      Sys.info()[["sysname"]], as.character(getRversion()),
                      nrow(mat), ncol(mat), length(uniqCols)))
          tokensig <- function(ch) {
            ch <- ch[!ch %in% c("-", "?", NA)]
            paste(sort(as.integer(table(ch)), decreasing = TRUE), collapse = ",")
          }
          run_all <- function(nmc) {
            cat(sprintf("===== n_mc = %d =====\n", nmc)); flush(stdout())
            for (i in uniqCols) {
              sig <- tokensig(mat[, i])
              cat(sprintf("n_mc=%d col=%d START split=[%s]\n", nmc, i, sig)); flush(stdout())
              t0 <- Sys.time()
              invisible(StepInformation(mat[, i], n_mc = nmc))
              el <- as.double(difftime(Sys.time(), t0, units = "secs"))
              if (el > 0.5) { cat(sprintf("  -> col=%d %.2fs split=[%s]\n", i, el, sig)); flush(stdout()) }
            }
            cat(sprintf("n_mc=%d ALL PATTERNS DONE\n", nmc)); flush(stdout())
          }
          run_all(1000L)
          run_all(100000L)
          cat("PROFILE PROBE DONE\n")
          EOF
          $TO Rscript prof.R || echo "### PROFILE PROBE hit timeout/err (rc=$?)"
        shell: bash
