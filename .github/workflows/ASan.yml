# Address Sanitizer: Replicate CRAN's gcc-ASAN 'Additional Test'
# Uses the r-hub gcc-asan container (R-devel built with ASAN/UBSAN).
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - '**asan**'
    paths:
      - '.github/workflows/ASan.yml'
      - 'src/**'
      - 'inst/include/**'
      - 'memcheck/**'
      - 'tests/testthat/**.R'
      - 'vignettes/**.Rmd'
  pull_request:
    paths:
      - '.github/workflows/ASan.yml'
      - 'src/**'
      - 'inst/include/**'
      - 'memcheck/**'
      - 'tests/testthat/**.R'
      - 'vignettes/**.Rmd'

name: gcc-ASAN

jobs:
  mem-check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/r-hub/containers/gcc-asan:latest

    name: AddressSanitizer ${{ matrix.config.test }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {test: 'tests'}
          - {test: 'examples'}
          - {test: 'vignettes'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # PREXPR() was removed from the R public API in R-devel (>= r87506,
      # 2025-01). Both CRAN rlang 1.1.7 and the current GitHub dev branch
      # embed PREXPR in their vendored src/rlang/rlang-types.h, so neither
      # can be built as-is on R-devel.
      #
      # Fix: download the CRAN source tarball, prepend a one-line shim
      #   #define PREXPR(x) R_PromiseExpr(x)   (guarded by #ifndef PREXPR)
      # to rlang-types.h, then install with R CMD INSTALL.  The #ifndef
      # guard makes this shim inert on older R where PREXPR is still defined.
      - name: Pre-install rlang with PREXPR compat shim
        run: |
          TMP=$(mktemp -d)
          Rscript -e "download.packages('rlang', destdir='$TMP', type='source', repos='https://cloud.r-project.org')"
          tar -xzf "$TMP"/rlang_*.tar.gz -C "$TMP"
          HDR="$TMP/rlang/src/rlang/rlang-types.h"
          { printf '#ifndef PREXPR\n#define PREXPR(x) R_PromiseExpr(x)\n#endif\n'; cat "$HDR"; } \
            > "$HDR.patched" && mv "$HDR.patched" "$HDR"
          R CMD INSTALL "$TMP/rlang"
          rm -rf "$TMP"

      - uses: ms609/actions/asan@main
        with:
          test: ${{ matrix.config.test }}
