# Address Sanitizer: Replicate CRAN's gcc-ASAN 'Additional Test'
# Uses the r-hub gcc-asan container (R-devel built with ASAN/UBSAN).
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - '**asan**'
    paths:
      - '.github/workflows/ASan.yml'
      - 'src/**'
      - 'inst/include/**'
      - 'memcheck/**'
      - 'tests/testthat/**.R'
      - 'vignettes/**.Rmd'
  pull_request:
    paths:
      - '.github/workflows/ASan.yml'
      - 'src/**'
      - 'inst/include/**'
      - 'memcheck/**'
      - 'tests/testthat/**.R'
      - 'vignettes/**.Rmd'

name: gcc-ASAN

jobs:
  mem-check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/r-hub/containers/gcc-asan:latest

    name: AddressSanitizer ${{ matrix.config.test }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {test: 'tests'}
          - {test: 'examples'}
          - {test: 'vignettes'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # rlang ≤1.1.7 (CRAN) uses PREXPR which was removed in R-devel 4.6.
      # The GitHub main branch already uses the new r_obj* abstraction.
      # Pre-install the development version so pak does not downgrade it.
      - name: Pre-install rlang (R-devel compat)
        run: Rscript -e 'pak::pak("r-lib/rlang")'

      - uses: ms609/actions/asan@main
        with:
          test: ${{ matrix.config.test }}
