# Agent-triggered check — dispatched via `gh` CLI from local agents.
# Runs R CMD check + optional filtered/extended tests on the pushed branch.
# Ubuntu ARM runs first (no vignettes, fast feedback); Windows runs on
# Ubuntu success and includes vignette builds to catch path/encoding issues.
#
# Usage:
#   bash gha-dispatch.sh agent-check.yml <branch>
#   bash gha-dispatch.sh agent-check.yml <branch> test_filter=ts- extended=true

name: agent-check

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "testthat filter (empty = R CMD check only)"
        required: false
        default: ""
      extended:
        description: "Run extended (tier 3) tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  ubuntu:
    runs-on: ubuntu-24.04-arm
    name: ubuntu-arm64

    env:
      NOT_CRAN: "true"
      TREESEARCH_EXTENDED_TESTS: ${{ inputs.extended }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RSPM: "https://packagemanager.posit.co/cran/__linux__/noble/latest"

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install apt packages
        run: |
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: '"--no-build-vignettes"'
          build_args: '"--no-build-vignettes"'

      - name: Run filtered tests
        if: inputs.test_filter != ''
        run: |
          Rscript -e "
            library(testthat)
            library(TreeSearch)
            test_dir('tests/testthat',
                     filter = '${{ inputs.test_filter }}',
                     reporter = 'progress',
                     stop_on_failure = TRUE)
          "
        shell: bash

  windows:
    needs: ubuntu
    runs-on: windows-latest
    name: windows

    env:
      NOT_CRAN: "true"
      TREESEARCH_EXTENDED_TESTS: ${{ inputs.extended }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: R CMD check (with vignettes)
        uses: r-lib/actions/check-r-package@v2

      - name: Run filtered tests
        if: inputs.test_filter != ''
        run: |
          Rscript -e "
            library(testthat)
            library(TreeSearch)
            test_dir('tests/testthat',
                     filter = '${{ inputs.test_filter }}',
                     reporter = 'progress',
                     stop_on_failure = TRUE)
          "
        shell: bash
