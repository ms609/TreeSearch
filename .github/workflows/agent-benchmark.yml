# Agent-triggered benchmark — dispatched via `gh` CLI from local agents.
# Runs performance regression benchmarks on consistent GHA hardware.
#
# Usage:
#   bash gha-dispatch.sh agent-benchmark.yml <branch>
#   bash gha-dispatch.sh agent-benchmark.yml <branch> datasets=all budget=20
#
# Results are uploaded as a downloadable artifact.
#   bash gha-results.sh <run_id>

name: agent-benchmark

on:
  workflow_dispatch:
    inputs:
      datasets:
        description: "Comma-separated dataset names, or 'all' (default: core 3)"
        required: false
        default: ""
      budget:
        description: "Per-dataset time budget in seconds"
        required: false
        default: "20"
      threads:
        description: "Number of threads"
        required: false
        default: "2"

jobs:
  benchmark:
    runs-on: ubuntu-24.04

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RSPM: "https://packagemanager.posit.co/cran/__linux__/noble/latest"

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Install package
        run: R CMD INSTALL .
        shell: bash

      - name: Run benchmarks
        run: |
          DATASETS="${{ inputs.datasets }}"
          BUDGET="${{ inputs.budget }}"
          THREADS="${{ inputs.threads }}"

          ARGS="--output=benchmark-results/results.csv"
          [ -n "$DATASETS" ] && ARGS="$ARGS --datasets=$DATASETS"
          [ -n "$BUDGET" ] && ARGS="$ARGS --budget=$BUDGET"
          [ -n "$THREADS" ] && ARGS="$ARGS --threads=$THREADS"
          ARGS="$ARGS --lib=$(Rscript -e 'cat(.libPaths()[1])')"

          echo "Running: Rscript dev/benchmarks/bench_regression.R $ARGS"
          Rscript dev/benchmarks/bench_regression.R $ARGS
        shell: bash

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/
          retention-days: 30
